# =============================================================================
# Docker Compose v2 — Stack Completa do WebScraper Jurídico
# =============================================================================
# Serviços incluídos:
#   - PostgreSQL 16 (banco de dados principal)
#   - Redis 7.2 (broker e backend do Celery)
#   - scraper-api (FastAPI REST)
#   - scraper-worker (Celery worker com Playwright)
#   - scraper-beat (Celery Beat scheduler)
#   - scraper-flower (Monitor Celery)
#   - Grafana 10.2 (dashboards)
#   - Prometheus v2.47 (métricas)
#   - Loki 2.9 (logs)
#   - Promtail 2.9 (coleta de logs)
#   - pgAdmin 4.8 (admin PostgreSQL)
#
# Uso:
#   cp .env.example .env   # configure as variáveis
#   docker compose up -d   # sobe a stack
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # BANCO DE DADOS — PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: scraper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webscraper}
      POSTGRES_USER: ${POSTGRES_USER:-scraper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scraper_pass_change_me}
      # Otimizações de performance para o container
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      # Persistência dos dados em volume nomeado
      - postgres_data:/var/lib/postgresql/data
      # Scripts de inicialização (se existirem)
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - scraper-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scraper} -d ${POSTGRES_DB:-webscraper}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # CACHE / BROKER — Redis 7.2
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: scraper-redis
    restart: unless-stopped
    # Configurações de persistência e memória
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - scraper-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # API REST — FastAPI (scraper-api)
  # ---------------------------------------------------------------------------
  scraper-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: scraper-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Garante que o Python não buffer o stdout (logs em tempo real)
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Hot-reload em desenvolvimento (remover em produção)
      - ./api:/app:cached
      # Módulo de banco de dados compartilhado
      - ./database:/app/database:cached
      # Logs persistentes
      - api_logs:/app/logs
    networks:
      - scraper-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # WORKER CELERY — Processamento assíncrono com Playwright
  # ---------------------------------------------------------------------------
  scraper-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: scraper-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # Configurações do Celery worker
      CELERY_WORKER_CONCURRENCY: "4"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "100"
    volumes:
      - ./worker:/app:cached
      - ./database:/app/database:cached
      - worker_logs:/app/logs
      # Cache do Playwright para evitar re-download do browser
      - playwright_cache:/root/.cache/ms-playwright
    networks:
      - scraper-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Celery worker — verifica se o processo está ativo
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery_config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    command: >
      celery -A worker.celery_config worker
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=4
      --max-tasks-per-child=100
      --queues=default,scraping,high_priority

  # ---------------------------------------------------------------------------
  # SCHEDULER CELERY BEAT — Tarefas periódicas
  # ---------------------------------------------------------------------------
  scraper-beat:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: scraper-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./worker:/app:cached
      - ./database:/app/database:cached
      - beat_schedule:/app/celerybeat
      - worker_logs:/app/logs
    networks:
      - scraper-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Beat usa arquivo de schedule — verifica existência
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/celerybeat/celerybeat-schedule || exit 0"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: >
      celery -A worker.celery_config beat
      --loglevel=${LOG_LEVEL:-info}
      --scheduler=celery.beat:PersistentScheduler
      --pidfile=/app/celerybeat/celerybeat.pid
      --schedule=/app/celerybeat/celerybeat-schedule

  # ---------------------------------------------------------------------------
  # MONITOR CELERY — Flower
  # ---------------------------------------------------------------------------
  scraper-flower:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: scraper-flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      # Flower usa a mesma URL do broker
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      FLOWER_PORT: ${FLOWER_PORT:-5555}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    networks:
      - scraper-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${FLOWER_PORT:-5555}/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      celery -A worker.celery_config flower
      --port=${FLOWER_PORT:-5555}
      --broker=${CELERY_BROKER_URL:-redis://redis:6379/0}
      --loglevel=${LOG_LEVEL:-info}
      --persistent=True
      --db=/tmp/flower.db

  # ---------------------------------------------------------------------------
  # MÉTRICAS — Prometheus v2.47
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: scraper-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Retenção de 30 dias de métricas
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=5GB
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - scraper-net
    depends_on:
      - scraper-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # LOGS — Loki 2.9
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.0
    container_name: scraper-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - scraper-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # COLETA DE LOGS — Promtail 2.9
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.0
    container_name: scraper-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Acesso aos logs do Docker
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Logs das aplicações
      - api_logs:/var/log/scraper/api:ro
      - worker_logs:/var/log/scraper/worker:ro
    networks:
      - scraper-net
    depends_on:
      loki:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # DASHBOARDS — Grafana 10.2
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: scraper-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_change_me}
      GF_SECURITY_ADMIN_USER: admin
      # Desabilita signup público
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Permite embedding (útil para dashboards integrados)
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      # Provisioning automático de datasources e dashboards
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - scraper-net
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # FRONTEND — Dashboard React/Vite
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000
    container_name: scraper-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - scraper-net
    depends_on:
      scraper-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # ADMIN POSTGRESQL — pgAdmin 4.8
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.1
    container_name: scraper-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@webscraper.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_change_me}
      # Desabilita o modo de servidor (mais simples para uso local)
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - scraper-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/misc/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# =============================================================================
# VOLUMES NOMEADOS — Persistência de dados
# =============================================================================
volumes:
  # Dados do PostgreSQL
  postgres_data:
    driver: local
    name: scraper_postgres_data

  # Dados do Redis
  redis_data:
    driver: local
    name: scraper_redis_data

  # Dados do Prometheus (séries temporais)
  prometheus_data:
    driver: local
    name: scraper_prometheus_data

  # Dados do Loki (logs)
  loki_data:
    driver: local
    name: scraper_loki_data

  # Dados do Grafana (configurações e dashboards)
  grafana_data:
    driver: local
    name: scraper_grafana_data

  # Dados do pgAdmin
  pgadmin_data:
    driver: local
    name: scraper_pgadmin_data

  # Logs da API
  api_logs:
    driver: local
    name: scraper_api_logs

  # Logs do Worker
  worker_logs:
    driver: local
    name: scraper_worker_logs

  # Schedule do Celery Beat
  beat_schedule:
    driver: local
    name: scraper_beat_schedule

  # Cache do Playwright (browsers)
  playwright_cache:
    driver: local
    name: scraper_playwright_cache

# =============================================================================
# REDES
# =============================================================================
networks:
  scraper-net:
    driver: bridge
    name: scraper-net
    ipam:
      config:
        - subnet: 172.20.0.0/16
