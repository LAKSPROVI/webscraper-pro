name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_FRONTEND_API_URL: ${{ secrets.DEPLOY_FRONTEND_API_URL || 'https://api-webscraper.jurislaw.com.br' }}
      DEPLOY_FRONTEND_WS_URL: ${{ secrets.DEPLOY_FRONTEND_WS_URL || 'wss://api-webscraper.jurislaw.com.br' }}
      APP_PATH: /opt/webscraper-pro/app
      FRONT_DIST_PATH: /opt/webscraper-pro/frontend
      API_HEALTH_URL: ${{ secrets.DEPLOY_API_HEALTH_URL || 'https://api-webscraper.jurislaw.com.br/health' }}

    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            PORT="${DEPLOY_PORT:-22}"
            ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy services on server
        shell: bash
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          FRONTEND_API_URL="${DEPLOY_FRONTEND_API_URL:-}"
          FRONTEND_WS_URL="${DEPLOY_FRONTEND_WS_URL:-}"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -p "$PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            FRONTEND_API_URL="$FRONTEND_API_URL" \
            FRONTEND_WS_URL="$FRONTEND_WS_URL" \
            'bash -s' <<'SH'
          set -euo pipefail

          sudo -u webscraper -H bash -lc '
            set -e
            cd /opt/webscraper-pro/app
            BRANCH="$(git rev-parse --abbrev-ref HEAD)"
            git pull --ff-only origin "$BRANCH"
          '

          systemctl restart webscraper-api webscraper-worker webscraper-scheduler

          # Escreve o .env.production ANTES do sudo (env vars disponíveis aqui, não dentro do sudo)
          {
            echo "VITE_API_URL=${FRONTEND_API_URL}"
            echo "VITE_WS_URL=${FRONTEND_WS_URL}"
          } > /opt/webscraper-pro/app/frontend/.env.production

          sudo -u webscraper -H bash -lc '
            set -e
            cd /opt/webscraper-pro/app/frontend
            npm ci --no-audit --no-fund
            npm run build
          '

          rsync -a --delete /opt/webscraper-pro/app/frontend/dist/ /opt/webscraper-pro/frontend/

          nginx -t
          systemctl reload nginx
          systemctl is-active webscraper-api webscraper-worker webscraper-scheduler nginx
          SH

      - name: Smoke test API
        if: ${{ env.API_HEALTH_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "$API_HEALTH_URL" | head -c 500
