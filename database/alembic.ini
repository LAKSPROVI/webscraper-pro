# =============================================================================
# alembic.ini — Configuração do Alembic para migrações de banco de dados
# =============================================================================
# Arquivo de configuração principal do Alembic.
# Para executar migrações:
#   alembic -c webscraper/database/alembic.ini upgrade head
#   alembic -c webscraper/database/alembic.ini downgrade -1
#   alembic -c webscraper/database/alembic.ini revision --autogenerate -m "descrição"
# =============================================================================

[alembic]
# Caminho para o diretório de migrações (relativo a este arquivo)
script_location = migrations

# Template para o nome dos arquivos de versão
# %(year)d%(month).2d%(day).2d_%(rev)s_%(slug)s.py
file_template = %%(rev)s_%%(slug)s

# Timezone para timestamps nos arquivos de migração
timezone = America/Sao_Paulo

# Número de espaços para indentação nas migrações geradas automaticamente
output_encoding = utf-8

# URL de conexão síncrona (substituída por env.py em runtime via variável de ambiente)
# Use DATABASE_SYNC_URL no ambiente, ou defina aqui para desenvolvimento local
sqlalchemy.url = postgresql://scraper:scraper_pass_change_me@localhost:5432/webscraper


# =============================================================================
# Configuração de logging do Alembic
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
