################################################################################
# grafana.ini — Configuração Grafana 10.2 para o WebScraper Jurídico
################################################################################
# Documentação oficial: https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/
#
# As seções abaixo cobrem as configurações mais importantes.
# Valores não definidos usam os padrões do Grafana.
# Variáveis de ambiente sobrescrevem valores deste arquivo:
#   GF_<SECAO>_<CHAVE>=valor
# Exemplo: GF_SECURITY_ADMIN_PASSWORD=senha
################################################################################

################################################################################
# [paths] — Caminhos de dados e plugins
################################################################################
[paths]
# Diretório de dados persistentes (mapeado para volume Docker)
data = /var/lib/grafana

# Diretório de logs
logs = /var/log/grafana

# Diretório de plugins instalados
plugins = /var/lib/grafana/plugins

# Diretório de provisionamento (datasources, dashboards, alertas)
provisioning = /etc/grafana/provisioning

################################################################################
# [server] — Configurações do servidor HTTP
################################################################################
[server]
# Protocolo (http | https | h2 | socket)
protocol = http

# Endereço de bind do servidor (0.0.0.0 = todas as interfaces)
http_addr = 0.0.0.0

# Porta HTTP
http_port = 3000

# Domínio (usado para geração de links em alertas)
# Altere para o domínio real em produção
domain = localhost

# Habilita gzip para respostas HTTP
enable_gzip = true

# URL raiz do Grafana (mantém padrão)
root_url = %(protocol)s://%(domain)s:%(http_port)s/

# Timeout de leitura HTTP em segundos
read_timeout = 0

################################################################################
# [database] — Banco de dados interno do Grafana
################################################################################
[database]
# Tipo do banco de dados (sqlite3 | mysql | postgres)
# sqlite3 é adequado para uso local; use postgres em produção com alta carga
type = sqlite3

# Caminho do arquivo SQLite
path = grafana.db

# Timeout de conexão em segundos
conn_max_lifetime = 14400

# Conexões máximas no pool
max_open_conn = 300

# Conexões idle máximas no pool
max_idle_conn = 2

################################################################################
# [security] — Segurança
################################################################################
[security]
# Usuário administrador padrão (sobrescrito pela variável de ambiente)
admin_user = admin

# Senha do admin (SEMPRE sobrescreva via variável GF_SECURITY_ADMIN_PASSWORD)
admin_password = ${GRAFANA_ADMIN_PASSWORD}

# Chave secreta para assinar sessões
# Gere uma aleatória: python -c "import secrets; print(secrets.token_hex(32))"
secret_key = SW2YcwTIb9zpOOhoPsMm

# Desabilita criação de conta pelo usuário final
disable_initial_admin_creation = false

# Permite embedding em iframes (útil para dashboards integrados)
allow_embedding = true

# Configura o Cookie SameSite
cookie_samesite = lax

# Content Security Policy
content_security_policy = false

# Desabilita uso do Gravatar (privacidade)
disable_gravatar = true

# Habilita proteção CSRF
csrf_trusted_origins = localhost

################################################################################
# [users] — Configurações de usuários
################################################################################
[users]
# Desabilita signup público (apenas admin pode criar usuários)
allow_sign_up = false

# Desabilita criação de organizações por usuários não-admin
allow_org_create = false

# Organização padrão para novos usuários
auto_assign_org = true
auto_assign_org_id = 1

# Role padrão para novos usuários (Viewer | Editor | Admin)
auto_assign_org_role = Viewer

# Desabilita login anônimo
viewers_can_edit = false

################################################################################
# [auth] — Autenticação
################################################################################
[auth]
# Desabilita login anônimo
disable_login_form = false

# Desabilita auto-login (força sempre apresentar tela de login)
oauth_auto_login = false

################################################################################
# [auth.anonymous] — Acesso anônimo (desabilitado por segurança)
################################################################################
[auth.anonymous]
enabled = false

################################################################################
# [dashboards] — Configurações de dashboards
################################################################################
[dashboards]
# Número de versões de dashboard a manter no histórico
versions_to_keep = 20

# Mínimo de refresh interval permitido (evita sobrecarga)
min_refresh_interval = 5s

# Diretório para dashboards provisionados
# (configurado via provisioning, não precisa mudar)

################################################################################
# [datasources] — Configurações globais de datasources
################################################################################
[datasources]
# Desabilita deleção de datasources provisionados
datasource_limit = 5000

################################################################################
# [alerting] — Sistema de alertas legado (Grafana 7.x)
################################################################################
[alerting]
# Desabilitado (usar Unified Alerting do Grafana 8+)
enabled = false

################################################################################
# [unified_alerting] — Sistema de alertas unificado (Grafana 8+)
################################################################################
[unified_alerting]
# Habilita o sistema de alertas unificado
enabled = true

# Diretório para estado dos alertas (persistência)
state_history_enabled = true

################################################################################
# [log] — Configurações de log do próprio Grafana
################################################################################
[log]
# Modo de log (console | file | syslog)
mode = console file

# Nível de log (debug | info | warn | error | critical)
level = info

# Filtros de log por módulo (opcional)
# filters = rendering:debug

################################################################################
# [log.console] — Log em console
################################################################################
[log.console]
level = info

# Formato do log (text | json)
format = json

################################################################################
# [log.file] — Log em arquivo
################################################################################
[log.file]
level = info
format = text
log_rotate = true

# Tamanho máximo antes de rotacionar (100MB)
max_size_mb = 100

# Número de arquivos de backup
max_days = 7
max_lines = 1000000

################################################################################
# [metrics] — Exposição de métricas Prometheus
################################################################################
[metrics]
# Habilita exposição de métricas no endpoint /metrics
enabled = true

# Intervalo de coleta de métricas internas
interval_seconds = 10

# Desabilita total de métricas de uso anônimas para Grafana Labs
disable_total_stats = true

################################################################################
# [grafana_net] — Conexão com grafana.com (desabilitada)
################################################################################
[grafana_net]
url = https://grafana.net

################################################################################
# [reporting] — Relatórios por email (desabilitado)
################################################################################
[reporting]
enabled = false

################################################################################
# [smtp] — Envio de email para alertas (configure se necessário)
################################################################################
[smtp]
enabled = false
# host = smtp.gmail.com:587
# user = seu_email@gmail.com
# password = sua_senha_de_app
# from_address = grafana@webscraper.local
# from_name = Grafana WebScraper

################################################################################
# [plugins] — Configurações de plugins
################################################################################
[plugins]
# Permite plugins não assinados (use com cuidado em produção)
allow_loading_unsigned_plugins =

# Habilita o catálogo de plugins
enable_alpha = false

################################################################################
# [feature_toggles] — Features experimentais
################################################################################
[feature_toggles]
# Habilita novo navbar
enable = publicDashboards

################################################################################
# [panels] — Configurações de painéis
################################################################################
[panels]
# Habilita alpha panels
enable_alpha = false

# Desabilita sanitize HTML (necessário para alguns painéis com HTML)
disable_sanitize_html = false
