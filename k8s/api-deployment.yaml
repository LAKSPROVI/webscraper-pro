apiVersion: apps/v1
kind: Deployment
metadata:
  name: webscraper-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webscraper-api
  template:
    metadata:
      labels:
        app: webscraper-api
    spec:
      containers:
        - name: api
          image: webscraper-pro-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: API_ENV
              value: "production"
            - name: API_ALLOWED_HOSTS
              value: "*"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: webscraper-api
spec:
  selector:
    app: webscraper-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
