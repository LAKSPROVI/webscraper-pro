apiVersion: apps/v1
kind: Deployment
metadata:
  name: webscraper-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webscraper-worker
  template:
    metadata:
      labels:
        app: webscraper-worker
    spec:
      containers:
        - name: worker
          image: webscraper-pro-worker:latest
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/1
